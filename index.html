<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Free Course Access</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
  <script>
    window.TelegramAdsControllerInstance = null;
    try {
      window.TelegramAdsControllerInstance = new TelegramAdsController();
      window.TelegramAdsControllerInstance.initialize({
        pubId: "1006337",
        appId: "6751",
      });
    } catch(e) {
      console.warn('TelegramAdsController init failed:', e);
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:      var(--tg-theme-bg-color,          #0f0f1a);
      --card:    var(--tg-theme-secondary-bg-color, #1a1a2e);
      --text:    var(--tg-theme-text-color,          #ffffff);
      --hint:    var(--tg-theme-hint-color,          #888888);
      --accent: #6c63ff;
      --green:  #16a34a;
      --radius: 18px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .screen { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; gap: 18px; text-align: center; animation: up .35s ease; }
    .screen.active { display: flex; }
    @keyframes up { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    .spinner { width:50px; height:50px; border:4px solid rgba(108,99,255,.2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg) } }
    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius);
      padding: 22px 18px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .course-icon { font-size: 52px; }
    .card h2 { font-size: 19px; font-weight: 800; line-height: 1.3; }
    .card p  { color: var(--hint); font-size: 13px; line-height: 1.6; max-width: 300px; }
    .divider { width:100%; height:1px; background:rgba(255,255,255,.07); }
    .steps { display:flex; gap:8px; width:100%; }
    .step  { flex:1; border-radius:99px; height:5px; background: rgba(255,255,255,.1); transition: background .4s; }
    .step.done   { background: var(--accent); }
    .step.active { background: var(--accent); animation: pulse-bar 1.2s ease-in-out infinite; }
    @keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:.5} }
    .btn-watch {
      width: 100%; padding: 15px; border: none; border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), #9333ea);
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 20px rgba(108,99,255,.4); transition: transform .15s, opacity .2s;
      position: relative; overflow: hidden;
    }
    .btn-watch:active  { transform: scale(.97); }
    .btn-watch:disabled { opacity: .5; cursor: not-allowed; background: rgba(255,255,255,.1); box-shadow: none; }
    .btn-enroll {
      width: 100%; padding: 15px; border: 2px solid rgba(255,255,255,.12); border-radius: var(--radius);
      background: rgba(255,255,255,.05); color: var(--hint); font-size: 15px; font-weight: 700;
      cursor: not-allowed; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all .4s ease;
    }
    .btn-enroll.unlocked {
      background: linear-gradient(135deg, var(--green), #15803d); border-color: transparent;
      color: #fff; cursor: pointer; box-shadow: 0 4px 24px rgba(22,163,74,.45);
    }
  </style>
</head>
<body>

<div id="s-loading" class="screen active">
  <div class="spinner"></div>
  <p style="color:var(--hint);font-size:13px">Checking course availability...</p>
</div>

<div id="s-main" class="screen">
  <div class="steps">
    <div class="step done"></div>
    <div class="step active" id="step2"></div>
    <div class="step" id="step3"></div>
  </div>

  <div class="card">
    <div class="course-icon">🎓</div>
    <h2>Unlock Your Free Course</h2>
    <p>Please watch a short sponsor message to activate your free enrollment.</p>
    <div class="divider"></div>
    <div class="info-row" style="font-size:12px; color:var(--hint);">🏷 Price: <strong style="color:#4ade80">FREE</strong></div>
    <div class="divider"></div>

    <button class="btn-watch" id="btn-watch">
      <span id="btn-icon">▶</span>
      <span id="btn-watch-label">Watch Ad to Unlock</span>
    </button>

    <button class="btn-enroll" id="btn-enroll" disabled>
      <span id="lock-icon">🔒</span>
      <span id="enroll-label">Enroll Course</span>
    </button>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp || null;
  if (tg) { tg.ready(); tg.expand(); }

  // 1. Decode Course URL
  function getCourseUrl() {
    const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
    if (!code) return 'https://www.udemy.com/';
    try {
      const padded = code + '=='.slice(0, (4 - code.length % 4) % 4);
      return atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
    } catch(e) { return 'https://www.udemy.com/'; }
  }

  const COURSE_URL = getCourseUrl();
  let adTriggered = false;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id)?.classList.add('active');
  }

  function unlockEverything() {
    if (document.getElementById('btn-enroll').classList.contains('unlocked')) return;
    
    document.getElementById('step2').classList.replace('active','done');
    document.getElementById('step3').classList.add('active');
    
    const btn = document.getElementById('btn-enroll');
    btn.disabled = false;
    btn.classList.add('unlocked');
    btn.innerHTML = "🚀 Access Course Now";
    btn.onclick = () => {
        if (tg?.openLink) { tg.openLink(COURSE_URL); setTimeout(()=>tg.close(), 500); }
        else { window.location.href = COURSE_URL; }
    };

    const watchBtn = document.getElementById('btn-watch');
    watchBtn.style.display = 'none';
  }

  async function startAd() {
    if (adTriggered) return;
    adTriggered = true;

    const btnLabel = document.getElementById('btn-watch-label');
    const watchBtn = document.getElementById('btn-watch');
    
    watchBtn.disabled = true;
    btnLabel.textContent = "Loading Ad...";

    // Safety Timeout: If ad fails to load in 7 seconds, unlock anyway
    const safetyTimer = setTimeout(() => {
      console.log("Ad timeout - auto unlocking");
      unlockEverything();
    }, 7000);

    const controller = window.TelegramAdsControllerInstance;

    if (controller && typeof controller.showAd === 'function') {
      try {
        // Calling the official RichAds method
        controller.showAd({
          onEnd: () => { clearTimeout(safetyTimer); unlockEverything(); },
          onClose: () => { clearTimeout(safetyTimer); unlockEverything(); },
          onError: (err) => { 
            console.error("Ad Error:", err);
            clearTimeout(safetyTimer);
            unlockEverything(); 
          }
        });
      } catch (e) {
        console.error("Critical Ad Fail:", e);
        unlockEverything();
      }
    } else {
      // If SDK not loaded, wait 2s then unlock
      setTimeout(unlockEverything, 2000);
    }
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      showScreen('s-main');
      document.getElementById('btn-watch').addEventListener('click', startAd);
    }, 1500);
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Free Course Access</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://w.tads.me/widget.js" async></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: var(--tg-theme-bg-color, #0f0f1a);
      --text: var(--tg-theme-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #888);
      --accent: #6c63ff;
      --green: #16a34a;
      --radius: 16px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .screen {
      display: none; width: 100%; max-width: 420px;
      flex-direction: column; align-items: center;
      gap: 16px; text-align: center;
      animation: fadeIn 0.3s ease;
    }
    .screen.active { display: flex; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* Loading */
    .spinner { width:48px; height:48px; border:4px solid rgba(108,99,255,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .hint { color:var(--hint); font-size:13px; }

    /* Ad screen */
    .icon { font-size:50px; }
    h2 { font-size:20px; font-weight:800; }
    .sub { color:var(--hint); font-size:13px; line-height:1.6; max-width:300px; }
    .badge { background:rgba(22,163,74,0.12); border:1px solid rgba(22,163,74,0.3); color:#4ade80; border-radius:99px; padding:5px 16px; font-size:12px; font-weight:700; }

    /* TADS container — حجم كبير واضح */
    #tads-container-9578 {
      width: 100%;
      min-height: 250px;
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
    }

    .btn {
      width:100%; padding:14px; border:none; border-radius:var(--radius);
      font-size:14px; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:transform 0.15s;
    }
    .btn:active { transform:scale(0.97); }
    .btn-green { background:linear-gradient(135deg,var(--green),#15803d); color:#fff; box-shadow:0 4px 16px rgba(22,163,74,0.3); }
    .btn-ghost { background:rgba(255,255,255,0.07); color:var(--text); border:1px solid rgba(255,255,255,0.1); }

    /* Redirecting */
    .big { font-size:60px; animation:pop 0.4s ease; }
    @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
    .redir-text { color:var(--hint); font-size:13px; }
  </style>
</head>
<body>

<!-- شاشة 1: تحميل -->
<div id="s-loading" class="screen active">
  <div class="spinner"></div>
  <p class="hint">Preparing your free course...</p>
</div>

<!-- شاشة 2: الإعلان — يُعرض تلقائياً -->
<div id="s-ad" class="screen">
  <div class="icon">🎓</div>
  <h2>One Quick Step!</h2>
  <p class="sub">Watch the ad to unlock your <strong>100% free</strong> Udemy course.</p>
  <span class="badge">✅ FREE — No payment needed</span>
  <!-- TADS Widget — حجم كبير -->
  <div id="tads-container-9578"></div>
  <p class="hint" style="font-size:11px">Your course opens automatically after the ad.</p>
  <!-- زر مباشر يظهر بعد 20 ثانية فقط إذا لم يحدث شيء -->
  <button class="btn btn-green" id="btn-direct" onclick="goToCourse()" style="display:none">
    <span>🔗</span><span>Access Course Directly</span>
  </button>
</div>

<!-- شاشة 3: جاري التوجيه — تظهر لثانية واحدة فقط -->
<div id="s-redir" class="screen">
  <div class="big">🚀</div>
  <h2>Opening your course...</h2>
  <p class="redir-text">Please wait a moment.</p>
</div>

<!-- شاشة 4: خطأ -->
<div id="s-error" class="screen">
  <div style="font-size:48px">⚠️</div>
  <h2>Ad Unavailable</h2>
  <p class="sub">No ads right now. Access your course directly.</p>
  <button class="btn btn-green" onclick="goToCourse()"><span>🔗</span><span>Access Course Directly</span></button>
  <button class="btn btn-ghost" onclick="initTads()" style="margin-top:4px">Try Again</button>
</div>

<script>
  // ===== Telegram =====
  const tg = window.Telegram?.WebApp || null;
  if (tg) { tg.ready(); tg.expand(); }

  // ===== فك تشفير رابط الكورس من Base64 =====
  function getCourseUrl() {
    const code = tg?.initDataUnsafe?.start_param
      || new URLSearchParams(window.location.search).get('startapp')
      || new URLSearchParams(window.location.search).get('tgWebAppStartParam');

    if (!code) { console.warn('No startapp param'); return null; }
    try {
      const padded = code + '=='.slice(0, (4 - code.length % 4) % 4);
      const decoded = atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
      console.log('✅ Course URL decoded:', decoded);
      if (decoded.startsWith('http')) return decoded;
    } catch(e) { console.error('Base64 error:', e, '| code:', code); }
    return null;
  }

  const COURSE_URL = getCourseUrl();
  const WIDGET_ID = 9578;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id)?.classList.add('active');
  }

  // ✅ التوجيه الفوري للكورس — بدون عداد
  function goToCourse() {
    const url = COURSE_URL || 'https://www.udemy.com/';
    console.log('🎓 Redirecting to:', url);
    showScreen('s-redir');
    // توجيه فوري بعد 800ms (وقت تحميل الشاشة فقط)
    setTimeout(() => {
      if (tg?.openLink) {
        tg.openLink(url);
        setTimeout(() => tg.close(), 500);
      } else {
        window.location.href = url;
      }
    }, 800);
  }

  // ===== تهيئة TADS =====
  function initTads() {
    if (!window.tads?.init) return;

    try {
      const adController = window.tads.init({
        widgetId: WIDGET_ID,
        type: 'static',
        debug: false,
        onShowReward: (adId) => {
          // ✅ المستخدم شاهد الإعلان — توجيه فوري
          console.log('Ad reward:', adId);
          goToCourse();
        },
        onClickReward: (adId) => {
          // ✅ المستخدم ضغط الإعلان — توجيه فوري
          console.log('Ad clicked:', adId);
          goToCourse();
        },
        onAdsNotFound: () => {
          console.warn('No ads found');
          showScreen('s-error');
        }
      });

      adController.loadAd()
        .then(() => {
          showScreen('s-ad');
          return adController.showAd();
        })
        .catch((err) => {
          console.error('Ad error:', err);
          showScreen('s-error');
        });

      // زر مباشر يظهر بعد 20 ثانية كبديل
      setTimeout(() => {
        const btn = document.getElementById('btn-direct');
        if (btn) btn.style.display = 'flex';
      }, 20000);

    } catch(e) {
      console.error('TADS init error:', e);
      showScreen('s-error');
    }
  }

  // ===== ابدأ =====
  window.addEventListener('load', () => {
    showScreen('s-loading');
    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (window.tads?.init) {
        clearInterval(iv);
        initTads();
      } else if (tries > 30) {
        clearInterval(iv);
        // إذا لم يُحمَّل TADS — اذهب للكورس مباشرة
        showScreen('s-error');
      }
    }, 200);
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Premium Course Access</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.8);
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --success: #10b981;
      --text-main: #f9fafb;
      --text-dim: #9ca3af;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

    body {
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow: hidden;
    }

    /* ── Glass Card ── */
    .container {
      width: 100%; max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 32px 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      position: relative;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Timer & Status ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 14px; border-radius: 99px;
      font-size: 12px; font-weight: 600; color: var(--accent);
      margin-bottom: 20px; border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .timer-circle {
      position: relative; width: 100px; height: 100px; margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }

    .timer-text {
      font-size: 32px; font-weight: 800; color: var(--text-main);
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .icon-display {
      font-size: 50px; display: none;
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }

    /* ── Typography ── */
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 18px; border-radius: 20px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white; box-shadow: 0 10px 20px -5px rgba(109, 40, 217, 0.5);
    }

    .btn-primary:disabled {
      background: #374151; color: #9ca3af; box-shadow: none; cursor: not-allowed;
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white; box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.5);
      display: none;
    }

    .btn:active { transform: scale(0.97); }

    /* ── Progress Bar ── */
    .progress-container {
      width: 100%; height: 6px; background: rgba(255,255,255,0.05);
      border-radius: 10px; margin-top: 20px; display: none;
    }
    .progress-fill {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 10px; transition: width 0.3s ease;
    }

    /* ── Footer ── */
    .footer-note {
      margin-top: 24px; font-size: 11px; color: var(--text-dim);
      opacity: 0.6; display: flex; align-items: center; justify-content: center; gap: 4px;
    }

    /* ── Ripples for loading ── */
    .pulse-ring {
      position: absolute; width: 100%; height: 100%;
      border: 2px solid var(--accent); border-radius: 50%;
      animation: ripple 2s infinite; opacity: 0;
    }
    @keyframes ripple {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container" id="main-card">
    <div class="status-badge" id="status-box">
      <span id="status-dot" style="width:8px; height:8px; background:var(--accent); border-radius:50%"></span>
      <span id="status-text">SYSTEM INITIALIZING</span>
    </div>

    <div class="timer-circle">
      <div class="pulse-ring" id="pulse-effect"></div>
      <div class="timer-text" id="countdown">10</div>
      <div class="icon-display" id="success-icon">🎓</div>
      <div class="icon-display" id="ad-icon">🎬</div>
    </div>

    <h1 id="title">Verifying Connection</h1>
    <p id="description">We are searching for the best available offers to unlock your course for free.</p>

    <button class="btn btn-primary" id="btn-watch" onclick="handleWatchAd()" disabled>
      <span id="btn-text">Checking Offers...</span>
    </button>

    <button class="btn btn-success" id="btn-enroll" onclick="goToCourse()">
      <span>🚀</span> ENROLL NOW FOR FREE
    </button>

    <div class="progress-container" id="progress-wrap">
      <div class="progress-fill" id="progress-bar"></div>
    </div>

    <div class="footer-note">
      <span>🛡️</span> Secure Verification by RichPartners
    </div>
  </div>

<script>
  const tg = window.Telegram?.WebApp || null;
  if (tg) { tg.ready(); tg.expand(); }

  let adsCtrl = null;
  let adUnlocked = false;
  let checkAttempts = 0;
  const MAX_ATTEMPTS = 20; // 10 seconds total (20 * 500ms)
  let checkInterval = null;

  // 1. Get Course URL
  function getCourseUrl() {
    const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
    if (!code) return 'https://www.udemy.com/';
    try {
      const decoded = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
      return decoded.startsWith('http') ? decoded : 'https://www.udemy.com/';
    } catch(e) { return 'https://www.udemy.com/'; }
  }
  const COURSE_URL = getCourseUrl();

  // 2. Initialization
  window.addEventListener('load', () => {
    if (typeof TelegramAdsController !== 'undefined') {
      try {
        adsCtrl = new TelegramAdsController();
        // Updated initialization with the new appId (6751)
        adsCtrl.initialize({ pubId: "1006337", appId: "6751" });
      } catch(e) { console.warn("Ads Init Fail"); }
    }
    
    checkInterval = setInterval(updateLogic, 500);
  });

  function updateLogic() {
    checkAttempts++;
    
    // Update Countdown UI
    const secondsLeft = Math.ceil((MAX_ATTEMPTS - checkAttempts) / 2);
    if (secondsLeft >= 0 && !adUnlocked) {
      document.getElementById('countdown').innerText = secondsLeft;
    }

    // Check for Ad
    let isAvailable = false;
    if (adsCtrl) {
      const checkFn = adsCtrl.isAdAvailable ?? adsCtrl.isReady ?? null;
      try { isAvailable = checkFn.call(adsCtrl); } catch(e) {}
    }

    if (isAvailable) {
      clearInterval(checkInterval);
      showAdReadyState();
      return;
    }

    // Timeout: Unlock Directly
    if (checkAttempts >= MAX_ATTEMPTS) {
      clearInterval(checkInterval);
      unlockDirectly();
    }
  }

  function showAdReadyState() {
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ad-icon').style.display = 'block';
    document.getElementById('pulse-effect').style.borderColor = 'var(--accent)';
    
    document.getElementById('status-text').innerText = "OFFER FOUND";
    document.getElementById('title').innerText = "Unlock Access";
    document.getElementById('description').innerText = "Watch a short sponsored video to unlock your premium enrollment for free.";
    
    const btn = document.getElementById('btn-watch');
    btn.disabled = false;
    document.getElementById('btn-text').innerText = "▶ WATCH AD TO UNLOCK";
  }

  async function handleWatchAd() {
    const btn = document.getElementById('btn-watch');
    btn.disabled = true;
    document.getElementById('btn-text').innerText = "Loading Video...";
    
    // Show progress bar purely for aesthetics
    document.getElementById('progress-wrap').style.display = 'block';
    let p = 0;
    const pIv = setInterval(() => { p += 2; if(p<=95) document.getElementById('progress-bar').style.width = p+'%'; }, 200);

    try {
      await adsCtrl.show();
      clearInterval(pIv);
      unlockDirectly();
    } catch (err) {
      clearInterval(pIv);
      const msg = String(err).toLowerCase();
      if (msg.includes('skip') || msg.includes('close')) {
        btn.disabled = false;
        document.getElementById('btn-text').innerText = "▶ WATCH AD TO UNLOCK";
        document.getElementById('progress-wrap').style.display = 'none';
        alert("Please watch the full ad to get your reward.");
      } else {
        unlockDirectly(); // Error case: bypass
      }
    }
  }

  function unlockDirectly() {
    adUnlocked = true;
    
    // UI Transitions
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ad-icon').style.display = 'none';
    document.getElementById('success-icon').style.display = 'block';
    document.getElementById('pulse-effect').style.display = 'none';
    
    document.getElementById('status-text').innerText = "ACCESS GRANTED";
    document.getElementById('status-dot').style.background = "var(--success)";
    document.getElementById('status-box').style.borderColor = "var(--success)";
    document.getElementById('status-box').style.color = "var(--success)";
    
    document.getElementById('title').innerText = "Ready to Begin!";
    document.getElementById('description').innerText = "The verification is complete. You now have full access to your course.";
    
    document.getElementById('btn-watch').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('btn-enroll').style.display = 'flex';
  }

  function goToCourse() {
    if (tg?.openLink) {
      tg.openLink(COURSE_URL);
      setTimeout(() => tg.close(), 1000);
    } else {
      window.location.href = COURSE_URL;
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Free Course Access</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ✅ Telega Ads SDK -->
  <script src="https://inapp.telega.io/sdk/v1/sdk.js"></script>
  <script>
    const ads = window.TelegaIn.AdsController.create_miniapp({
      token: '0ffb7d2c-8b45-4b17-b256-70df12cae24e'
    });
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:#0f0f1a; --card:#1a1a2e; --text:#fff;
      --hint:#888; --accent:#6c63ff; --green:#16a34a;
      --radius:18px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif;
      display:flex; justify-content:center; align-items:center;
      min-height:100vh;
    }

    .screen{display:none;flex-direction:column;align-items:center;gap:15px}
    .screen.active{display:flex}

    .btn-watch,.btn-enroll{
      width:100%;padding:14px;border-radius:14px;border:none;
      font-weight:bold;cursor:pointer
    }

    .btn-watch{background:#6c63ff;color:#fff}
    .btn-enroll{background:#444;color:#aaa;cursor:not-allowed}
    .btn-enroll.unlocked{background:#16a34a;color:#fff;cursor:pointer}
  </style>
</head>

<body>

<div id="s-loading" class="screen active">
  <p>Loading...</p>
</div>

<div id="s-main" class="screen">

  <h2>Unlock Your Course</h2>

  <button id="btn-watch" class="btn-watch">
    ▶ Watch Ad
  </button>

  <button id="btn-enroll" class="btn-enroll" disabled>
    🔒 Locked
  </button>

</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  function getCourseUrl() {
    const code = tg?.initDataUnsafe?.start_param ||
      new URLSearchParams(location.search).get('startapp');

    if (!code) return null;

    try {
      const padded = code + '=='.slice(0, (4 - code.length % 4) % 4);
      return atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
    } catch { return null; }
  }

  const COURSE_URL = getCourseUrl();

  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function unlockEnroll(){
    const btn = document.getElementById('btn-enroll');
    btn.disabled = false;
    btn.classList.add('unlocked');
    btn.textContent = "🚀 Enroll Now";
    btn.onclick = goToCourse;
  }

  function goToCourse(){
    const url = COURSE_URL || "https://www.udemy.com/";
    if (tg?.openLink) {
      tg.openLink(url);
    } else {
      location.href = url;
    }
  }

  // ✅ تشغيل إعلان Telega
  function startAd(){
    const watchBtn = document.getElementById('btn-watch');
    watchBtn.disabled = true;
    watchBtn.textContent = "Loading Ad...";

    try {
      ads.ad_show({
        adBlockUuid: "37bc4389-341b-4974-b67c-ae37aef5e277"
      });

      // ✅ نفترض نجاح الإعلان بعد ثواني (SDK لا يعطي callback واضح)
      setTimeout(() => {
        unlockEnroll();
        watchBtn.textContent = "Ad Completed";
      }, 4000);

    } catch(e){
      console.error(e);
      unlockEnroll();
    }
  }

  document.getElementById('btn-watch').addEventListener('click', startAd);

  window.onload = () => {
    setTimeout(()=>{
      showScreen('s-main');
    },1000);
  };
</script>

</body>
</html>

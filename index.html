<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- SDK -->
<script src='//libtl.com/sdk.js' data-zone='10788963' data-sdk='show_10788963'></script>

<style>
body {
  margin:0;
  background:#0f0f1a;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

.loader {
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #6c63ff;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div>
  <div class="loader"></div>
  <p style="margin-top:15px;color:#aaa">
    Preparing your course...
  </p>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// فك الرابط
function getCourseUrl() {
  const code = tg?.initDataUnsafe?.start_param
    || new URLSearchParams(location.search).get('startapp');

  if (!code) return "https://www.udemy.com/";

  try {
    const padded = code + '=='.slice(0, (4 - code.length % 4) % 4);
    return atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
  } catch {
    return "https://www.udemy.com/";
  }
}

const COURSE_URL = getCourseUrl();

// التوجيه
function goToCourse() {
  console.log("Redirecting...");
  if (tg?.openLink) {
    tg.openLink(COURSE_URL);
    setTimeout(() => tg.close(), 500);
  } else {
    location.href = COURSE_URL;
  }
}

// تشغيل الإعلان
function startAd() {
  try {
    show_10788963({
      type: 'inApp',
      inAppSettings: {
        frequency: 2,
        capping: 0.1,
        interval: 30,
        timeout: 5,
        everyPage: false
      }
    });
    console.log("Ad requested");
  } catch(e) {
    console.error("Ad error:", e);
  }
}

// عند تحميل الصفحة
window.onload = () => {

  // شغل الإعلان فوراً
  startAd();

  // ⏳ انتظر 20 ثانية كحد أقصى
  setTimeout(() => {
    goToCourse();
  }, 20000);
};
</script>

</body>
</html>

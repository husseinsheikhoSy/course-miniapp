<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Free Course Access</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050508;
      --card: rgba(15, 15, 25, 0.7);
      --text: #ffffff;
      --hint: #94a3b8;
      --accent: #6366f1;
      --accent2: #a855f7;
      --radius: 30px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* خلفية فنية متطورة */
    .bg-glow {
      position: fixed;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      background: 
        radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 400px;
      flex-direction: column;
      z-index: 1;
      animation: fadeIn 0.8s ease-out;
    }
    .screen.active { display: flex; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card {
      background: var(--card);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }

    .icon-box {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 35px;
      box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
      animation: pulse-icon 3s infinite;
    }

    @keyframes pulse-icon {
      0% { transform: scale(1); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 15px 45px rgba(99, 102, 241, 0.6); }
      100% { transform: scale(1); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      margin-bottom: 12px;
      background: linear-gradient(to right, #fff, #cbd5e1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    p { color: var(--hint); font-size: 14px; line-height: 1.6; margin-bottom: 30px; }

    .btn-main {
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: 20px;
      background: #fff;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .btn-main:hover { transform: translateY(-2px); filter: brightness(0.9); }
    .btn-main:active { transform: scale(0.98); }

    .btn-main.loading { opacity: 0.7; pointer-events: none; }

    #btn-enroll {
      display: none;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      margin-top: 10px;
    }

    .info-bar {
      display: flex; justify-content: space-around;
      margin-bottom: 25px;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: 15px;
    }
    .info-item span { display: block; }
    .info-label { font-size: 10px; text-transform: uppercase; color: var(--hint); font-weight: 700; margin-bottom: 4px; }
    .info-val { font-size: 13px; font-weight: 700; }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="s-main" class="screen active">
  <div class="card">
    <div class="icon-box">🎓</div>
    <h1>Premium Access</h1>
    <p>Unlock your professional course for free by watching a short sponsor video.</p>

    <div class="info-bar">
      <div class="info-item">
        <span class="info-label">Price</span>
        <span class="info-val" style="color:#10b981">FREE</span>
      </div>
      <div class="info-item">
        <span class="info-label">Type</span>
        <span class="info-val">Certified</span>
      </div>
      <div class="info-item">
        <span class="info-label">Time</span>
        <span class="info-val">~15s</span>
      </div>
    </div>

    <button class="btn-main" id="btn-watch" onclick="handleAdClick()">
      <span id="watch-text">Watch Ad to Unlock</span>
    </button>

    <button class="btn-main" id="btn-enroll" onclick="goToCourse()">
      🚀 Enroll Now - Free
    </button>

    <div id="status-note" style="margin-top:20px; font-size:12px; color:rgba(255,255,255,0.3)">
      Secure connection established
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp || null;
  if (tg) { tg.ready(); tg.expand(); }

  // تهيئة المتحكم بالإعلانات
  let adsController = null;
  
  function initAds() {
    if (typeof TelegramAdsController !== 'undefined') {
      adsController = new TelegramAdsController();
      adsController.initialize({
        pubId: "1006337",
        appId: "6751",
      });
      console.log("Ads Controller Initialized");
    }
  }

  // محاولة التهيئة عند التحميل
  window.addEventListener('load', initAds);

  async function handleAdClick() {
    const btn = document.getElementById('btn-watch');
    const txt = document.getElementById('watch-text');
    
    btn.classList.add('loading');
    txt.innerText = "Loading Ad...";

    // إذا لم يتم تحميل السكربت بعد، نحاول تهيئته مجدداً
    if (!adsController) initAds();

    try {
      if (adsController) {
        // ننتظر قليلاً للتأكد من استجابة السكربت
        await Promise.race([
          adsController.show().catch(e => console.log("Ad show error", e)),
          new Promise(resolve => setTimeout(resolve, 5000)) // مهلة 5 ثواني
        ]);
      }
    } catch (e) {
      console.error("Ad interaction failed", e);
    } finally {
      // في كل الأحوال، نقوم بتفعيل الزر للمستخدم بعد 2 ثانية من المحاولة
      setTimeout(unlockCourse, 1500);
    }
  }

  function unlockCourse() {
    document.getElementById('btn-watch').style.display = 'none';
    const enrollBtn = document.getElementById('btn-enroll');
    enrollBtn.style.display = 'flex';
    document.getElementById('status-note').innerText = "Course Unlocked Successfully!";
  }

  function goToCourse() {
    const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
    let url = 'https://www.udemy.com/'; // الرابط الافتراضي
    
    if (code) {
      try {
        const decoded = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
        if (decoded.startsWith('http')) url = decoded;
      } catch(e) {}
    }

    if (tg?.openLink) {
      tg.openLink(url);
      setTimeout(() => tg.close(), 800);
    } else {
      window.location.href = url;
    }
  }
</script>

</body>
</html>

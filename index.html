<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free Course Access</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    body {
      background:#050508; color:#fff; font-family:sans-serif;
      display:flex; align-items:center; justify-content:center; height:100vh;
    }
    .card { text-align:center; max-width:350px; }
    button {
      width:100%; padding:15px; border:none; border-radius:10px;
      margin-top:10px; font-size:16px; font-weight:bold; cursor:pointer;
    }
    #btn-watch { background:#fff; color:#000; }
    #btn-enroll { background:#10b981; color:#fff; opacity:0.5 }
    #btn-enroll:enabled { opacity:1 }
    #status { margin-top:10px; font-size:13px; color:#aaa; }
  </style>
</head>

<body>

<div class="card">
  <h2>🎓 Premium Course</h2>
  <p>Watch a short ad to unlock</p>

  <button id="btn-watch" onclick="handleAdClick()">▶ Watch Ad</button>

  <button id="btn-enroll" onclick="goToCourse()" disabled>
    🚀 Enroll Now
  </button>

  <div id="status">Ready</div>
</div>

<script>
const tg = window.Telegram?.WebApp || null;
if (tg) { tg.ready(); tg.expand(); }

let adUnlocked = false;
let adInProgress = false;
let adsCtrl = null;

window.addEventListener('load', () => {
  try {
    adsCtrl = new TelegramAdsController();
    adsCtrl.initialize({
      pubId: "1006337",
      appId: "6751",
    });
    setStatus("Ready to show ads", "#6366f1");
  } catch (e) {
    setStatus("Ads failed to initialize → direct access", "#f59e0b");
    unlockDirect();
  }
});

async function handleAdClick() {
  if (adInProgress || adUnlocked) return;

  adInProgress = true;
  setStatus("Loading ad...", "#aaa");

  try {
    await adsCtrl.show();

    // ✅ الإعلان اشتغل وانتهى
    adUnlocked = true;
    enableEnroll();
    setStatus("✅ Course unlocked!", "#10b981");

  } catch (e) {
    const msg = String(e?.message || e || "").toLowerCase();

    const skipped =
      msg.includes("skip") ||
      msg.includes("close") ||
      msg.includes("dismiss");

    if (skipped) {
      setStatus("⚠️ Please watch full ad", "#f59e0b");
    } else {
      // ❌ لا يوجد إعلان → افتح مباشرة
      unlockDirect();
    }
  }

  adInProgress = false;
}

function unlockDirect() {
  adUnlocked = true;
  enableEnroll();
  document.getElementById("btn-watch").style.display = "none";
  setStatus("✅ No ads → direct access", "#10b981");
}

function enableEnroll() {
  document.getElementById("btn-enroll").disabled = false;
}

function goToCourse() {
  if (!adUnlocked) return;

  let url = "https://www.udemy.com/";

  if (tg?.openLink) {
    tg.openLink(url);
    setTimeout(() => tg.close(), 800);
  } else {
    window.location.href = url;
  }
}

function setStatus(msg, color) {
  const el = document.getElementById("status");
  el.innerText = msg;
  el.style.color = color;
}
</script>

</body>
</html>

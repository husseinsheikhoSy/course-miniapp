<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Premium Course Access</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Ad Services Scripts -->
    <script src="https://w.tads.me/widget.js"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        :root {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --success: #10b981;
            --btn-bg: #e5e7eb;
            --btn-text: #374151;
            --item-bg: #f9fafb;
            --border-color: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            position: relative;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .progress-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-muted);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Task List Styles */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--item-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .task-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .task-item.completed {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.05);
        }

        .task-info-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e7ff;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .task-item.completed .task-icon {
            background: #d1fae5;
            color: var(--success);
        }

        .task-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .task-reward {
            font-size: 12px;
            font-weight: 500;
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Buttons */
        .task-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-btn:not(:disabled):hover {
            background: #d1d5db;
        }

        .task-btn.done {
            background: transparent;
            color: var(--success);
            font-size: 15px;
            pointer-events: none;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .main-btn.disabled {
            background: var(--btn-bg);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .main-btn.active {
            background: var(--success);
            color: white;
            box-shadow: 0 8px 20px -6px rgba(16, 185, 129, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* === TGB Ad Container Styles === */
        .tgb-ad-wrapper {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .tgb-ad-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }

        #tads-container-9636 {
            width: 100%;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #tads-container-9636:empty {
            display: none;
        }
        
        /* Loading indicator */
        .loading-text {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 4px;
            display: none;
        }
        .loading-text.show {
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-top">
            <h1>Getting Started</h1>
            <span class="progress-text" id="progress-text">0/2</span>
        </div>
        <p class="subtitle">Complete the tasks below to get your free course link.</p>

        <div class="task-list">
            <div class="task-item" id="task1">
                <div class="task-info-wrapper">
                    <div class="task-icon" id="icon1">🎬</div>
                    <div>
                        <div class="task-title">Watch First Ad</div>
                        <div class="task-reward">⭐ Required step</div>
                    </div>
                </div>
                <button class="task-btn" id="btn-ad1" onclick="watchAd(1)">Start</button>
                <div class="loading-text" id="loading1"></div>
            </div>

            <div class="task-item disabled" id="task2">
                <div class="task-info-wrapper">
                    <div class="task-icon" id="icon2">🎬</div>
                    <div>
                        <div class="task-title">Watch Second Ad</div>
                        <div class="task-reward">⭐ Required step</div>
                    </div>
                </div>
                <button class="task-btn" id="btn-ad2" onclick="watchAd(2)" disabled>Start</button>
                <div class="loading-text" id="loading2"></div>
            </div>
        </div>

        <button class="main-btn disabled" id="btn-final" onclick="goToCourse()" disabled>
            🔒 Complete tasks to unlock
        </button>

        <!-- === TGB Ad Section (Widget ID: 9636) === -->
        <div class="tgb-ad-wrapper">
            <span class="tgb-ad-label">Sponsored</span>
            <div id="tads-container-9636"></div>
        </div>
    </div>

    <script>
        // === إعدادات الخدمات الإعلانية ===
        const ADS_CONFIG = {
            TADS: {
                fullscreenWidgetId: "9579",
                tgbWidgetId: "9636",
                type: "fullscreen"
            },
            RICHINFO: {
                pubId: "1006337",
                appId: "6751"
            }
        };

        // === متغيرات التحكم ===
        const tg = window.Telegram?.WebApp || null;
        if (tg) { tg.ready(); tg.expand(); }

        let tadsFullscreenController = null;
        let richinfoController = null;
        let richinfoInitialized = false;
        let tadsReady = false;

        // حالة المهام
        let currentStep = 1;
        let isAdPlaying = false;
        const taskProgress = { 1: false, 2: false };

        // === استخلاص رابط الدورة ===
        function getCourseUrl() {
            const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
            if (!code) return 'https://www.udemy.com/';
            try {
                const decoded = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
                return decoded.startsWith('http') ? decoded : 'https://www.udemy.com/';
            } catch (e) { return 'https://www.udemy.com/'; }
        }
        const COURSE_URL = getCourseUrl();

        // === تهيئة الخدمات عند تحميل الصفحة ===
        window.addEventListener('load', () => {
            initTadsFullscreen();
            initRichinfoFallback();
            initTGBStaticAd();
        });

        // تهيئة خدمة TADS Fullscreen (الأساسية)
        function initTadsFullscreen() {
            const checkInterval = setInterval(() => {
                if (window.tads && typeof window.tads.init === 'function') {
                    clearInterval(checkInterval);
                    tadsReady = true;
                    tadsFullscreenController = window.tads.init({
                        widgetId: ADS_CONFIG.TADS.fullscreenWidgetId,
                        type: ADS_CONFIG.TADS.type,
                        debug: false,
                        onShowReward: () => handleAdSuccess('tads'),
                        onAdsNotFound: () => console.log('TADS: No ads available'),
                        onError: (err) => console.error('TADS Error:', err)
                    });
                }
            }, 100);
        }

        // تهيئة خدمة Richinfo (البديلة)
        function initRichinfoFallback() {
            const tryInit = () => {
                if (window.TelegramAdsController && typeof window.TelegramAdsController === 'function') {
                    try {
                        richinfoController = new window.TelegramAdsController();
                        richinfoController.initialize({
                            pubId: ADS_CONFIG.RICHINFO.pubId,
                            appId: ADS_CONFIG.RICHINFO.appId,
                            onAdCompleted: () => handleAdSuccess('richinfo'),
                            onAdFailed: () => console.log('Richinfo: Ad failed or not available'),
                            onAdNotAvailable: () => console.log('Richinfo: No ad available')
                        });
                        richinfoInitialized = true;
                        console.log('Richinfo initialized successfully');
                    } catch (e) {
                        console.error('Richinfo init error:', e);
                    }
                }
            };

            if (window.TelegramAdsController) {
                tryInit();
            } else {
                const checkRich = setInterval(() => {
                    if (window.TelegramAdsController) {
                        clearInterval(checkRich);
                        tryInit();
                    }
                }, 100);
                setTimeout(() => clearInterval(checkRich), 5000);
            }
        }

        // تهيئة إعلان TGB الثابت (للعرض الجانبي)
        function initTGBStaticAd() {
            const adsNotFoundCallback = () => {
                console.log('TGB Static: No ads found');
                const container = document.getElementById(`tads-container-${ADS_CONFIG.TADS.tgbWidgetId}`);
                if (container) container.style.display = 'none';
            };

            const initController = () => {
                if (!window.tads || typeof window.tads.init !== 'function') return;
                
                const tgbController = window.tads.init({
                    widgetId: ADS_CONFIG.TADS.tgbWidgetId,
                    type: 'static',
                    debug: false,
                    onAdsNotFound: adsNotFoundCallback
                });

                if (tgbController && typeof tgbController.loadAd === 'function') {
                    tgbController.loadAd()
                        .then(() => tgbController.showAd())
                        .catch((err) => {
                            console.log("TGB Static load error:", err);
                            adsNotFoundCallback();
                        });
                }
            };

            if (window.tads && window.tads.init) {
                initController();
            } else {
                let tadsInterval = setInterval(() => {
                    if (window.tads && window.tads.init) {
                        clearInterval(tadsInterval);
                        initController();
                    }
                }, 100);
            }
        }

        // === دالة عرض الإعلان مع آلية Fallback متعددة المستويات ===
        function showAdWithFallback(stepNumber) {
            return new Promise((resolve) => {
                let resolved = false;
                const safeResolve = (value) => {
                    if (!resolved) {
                        resolved = true;
                        resolve(value);
                    }
                };

                const updateLoading = (msg) => {
                    const el = document.getElementById(`loading${stepNumber}`);
                    if (el) {
                        el.textContent = msg;
                        el.classList.add('show');
                    }
                };

                // المستوى 1: محاولة TADS أولاً
                if (tadsReady && tadsFullscreenController && typeof tadsFullscreenController.showAd === 'function') {
                    updateLoading('🔄 Loading ad...');
                    
                    tadsFullscreenController.showAd()
                        .then(() => safeResolve('tads'))
                        .catch((err) => {
                            console.log('TADS showAd failed:', err);
                            tryRichinfo();
                        });
                    
                    // مهلة 8 ثوانٍ لـ TADS
                    setTimeout(() => {
                        if (!resolved) {
                            console.log('TADS timeout, switching to fallback');
                            updateLoading('🔄 Trying alternative...');
                            tryRichinfo();
                        }
                    }, 8000);
                } else {
                    console.log('TADS not ready, trying Richinfo directly');
                    tryRichinfo();
                }

                // المستوى 2: محاولة Richinfo
                function tryRichinfo() {
                    if (richinfoInitialized && richinfoController) {
                        try {
                            updateLoading('🔄 Loading alternative ad...');
                            
                            // محاولة استدعاء العرض بطرق مختلفة حسب توفرها
                            if (typeof richinfoController.showAd === 'function') {
                                richinfoController.showAd();
                            } else if (typeof richinfoController.loadAndShow === 'function') {
                                richinfoController.loadAndShow();
                            } else if (typeof richinfoController.displayAd === 'function') {
                                richinfoController.displayAd();
                            } else {
                                // إذا لم توجد طريقة عرض واضحة، نعتبره ناجحاً بعد تأخير
                                console.log('Richinfo: No explicit show method, using fallback');
                                setTimeout(() => {
                                    if (!resolved) {
                                        safeResolve('richinfo-fallback');
                                        handleAdSuccess('richinfo-fallback');
                                    }
                                }, 1500);
                            }
                        } catch (e) {
                            console.error('Richinfo show error:', e);
                            tryManualSkip();
                        }
                    } else {
                        console.log('Richinfo not initialized, trying manual skip');
                        tryManualSkip();
                    }
                }

                // المستوى 3: تجاوز يدوي كحل أخير
                function tryManualSkip() {
                    updateLoading('⏭️ Skipping...');
                    console.log('All ad services unavailable, using manual skip');
                    setTimeout(() => {
                        if (!resolved) {
                            safeResolve('manual-skip');
                            handleAdSuccess('manual-skip');
                        }
                    }, 1000);
                }
            });
        }

        // === دالة بدء مشاهدة الإعلان (مرتبطة بالأزرار) ===
        function watchAd(stepNumber) {
            if (stepNumber !== currentStep || isAdPlaying) return;
            if (taskProgress[stepNumber]) return;

            isAdPlaying = true;
            const btn = document.getElementById(`btn-ad${stepNumber}`);
            const originalText = btn.innerText;
            
            btn.innerText = "⏳";
            btn.disabled = true;

            showAdWithFallback(stepNumber)
                .then((source) => {
                    console.log(`✅ Ad completed via: ${source}`);
                })
                .catch((err) => {
                    console.error('❌ Ad flow error:', err);
                    handleAdFallback();
                })
                .finally(() => {
                    if (!taskProgress[stepNumber]) {
                        btn.innerText = originalText;
                        btn.disabled = false;
                        isAdPlaying = false;
                        const loadingEl = document.getElementById(`loading${stepNumber}`);
                        if (loadingEl) loadingEl.classList.remove('show');
                    }
                });
        }

        // === معالجة نجاح الإعلان (من أي مصدر) ===
        function handleAdSuccess(source) {
            console.log(`🎉 Ad success from: ${source}`);
            
            if (!taskProgress[currentStep]) {
                taskProgress[currentStep] = true;
                
                const currentBtn = document.getElementById(`btn-ad${currentStep}`);
                const currentItem = document.getElementById(`task${currentStep}`);
                const currentIcon = document.getElementById(`icon${currentStep}`);
                const loadingEl = document.getElementById(`loading${currentStep}`);

                // تحديث الواجهة
                currentBtn.innerText = "✅";
                currentBtn.classList.add('done');
                currentItem.classList.add('completed');
                currentIcon.innerText = "✓";
                if (loadingEl) loadingEl.classList.remove('show');
                
                const completedCount = Object.values(taskProgress).filter(v => v).length;
                document.getElementById('progress-text').innerText = `${completedCount}/2`;

                // الانتقال للخطوة التالية
                if (currentStep === 1) {
                    const nextItem = document.getElementById('task2');
                    const nextBtn = document.getElementById('btn-ad2');
                    nextItem.classList.remove('disabled');
                    nextBtn.disabled = false;
                    currentStep = 2;
                } else if (currentStep === 2) {
                    const finalBtn = document.getElementById('btn-final');
                    finalBtn.classList.remove('disabled');
                    finalBtn.classList.add('active');
                    finalBtn.disabled = false;
                    finalBtn.innerHTML = "🚀 Enter Course Now";
                }
            }
            
            isAdPlaying = false;
        }

        // === معالجة الفشل النهائي ===
        function handleAdFallback() {
            console.warn('⚠️ All ad services failed, using final fallback');
            setTimeout(() => {
                handleAdSuccess('final-fallback');
            }, 500);
        }

        // === فتح رابط الدورة ===
        function goToCourse() {
            if (tg?.openLink) {
                tg.openLink(COURSE_URL);
                setTimeout(() => tg.close(), 1000);
            } else {
                window.location.href = COURSE_URL;
            }
        }
    </script>
</body>
</html>

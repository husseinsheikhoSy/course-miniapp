<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Free Course Access</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050508;
      --card: rgba(15, 15, 25, 0.7);
      --text: #ffffff;
      --hint: #94a3b8;
      --accent: #6366f1;
      --accent2: #a855f7;
      --radius: 30px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow: hidden;
    }

    .bg-glow {
      position: fixed; width: 100vw; height: 100vh; z-index: 0;
      background:
        radial-gradient(circle at 10% 10%, rgba(99,102,241,0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(168,85,247,0.1) 0%, transparent 40%);
    }

    .screen {
      display: none; width: 100%; max-width: 400px;
      flex-direction: column; z-index: 1;
      animation: fadeIn 0.8s ease-out;
    }
    .screen.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }

    .icon-box {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 35px;
    }

    h1 { font-size: 28px; margin-bottom: 12px; }
    p { color: var(--hint); font-size: 14px; margin-bottom: 30px; }

    .btn-main {
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: 20px;
      background: #fff;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-main:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    #btn-enroll {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      margin-top: 10px;
    }

    #status-note {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    #ad-progress-wrap { display:none; margin-top:15px; }
    #ad-progress-bar-bg {
      width:100%; height:6px; background:#222; border-radius:10px;
    }
    #ad-progress-bar {
      height:100%; width:0%;
      background:linear-gradient(90deg,#6366f1,#a855f7);
    }

  </style>
</head>

<body>

<div class="bg-glow"></div>

<div class="screen active">
  <div class="card">

    <div class="icon-box">🎓</div>
    <h1>Premium Access</h1>
    <p>Watch a short ad to unlock your course.</p>

    <button class="btn-main" id="btn-watch" onclick="handleAdClick()">
      <span id="watch-text">▶ Watch Ad</span>
    </button>

    <div id="ad-progress-wrap">
      <div id="ad-progress-bar-bg">
        <div id="ad-progress-bar"></div>
      </div>
    </div>

    <button class="btn-main" id="btn-enroll" onclick="goToCourse()" disabled>
      🚀 Enroll Now
    </button>

    <div id="status-note">Checking ads...</div>

  </div>
</div>

<script>

/* ===== Telegram ===== */
const tg = window.Telegram?.WebApp || null;
if (tg) { tg.ready(); tg.expand(); }

/* ===== SYSTEM ===== */
let adUnlocked=false, adInProgress=false, adsCtrl=null;
let adStartTime=0, tabHidden=false, lastClick=0;

const MIN_WATCH_TIME = 7000;
const CLICK_COOLDOWN = 3000;

/* ===== TAB DETECT ===== */
document.addEventListener("visibilitychange", ()=>{
  tabHidden = document.hidden;
});

/* ===== INIT ===== */
window.addEventListener("load", ()=>{
  if (typeof TelegramAdsController !== 'undefined') {
    try {
      adsCtrl = new TelegramAdsController();
      adsCtrl.initialize({ pubId:"1006337", appId:"6751" });
    } catch(e){ adsCtrl=null; }
  }

  if (!adsCtrl) unlockDirect();
  else setStatus('Watch ad to unlock', '#aaa');
});

/* ===== CLICK ===== */
async function handleAdClick(){

  const now = Date.now();
  if (now - lastClick < CLICK_COOLDOWN) {
    setStatus('Wait...', '#f59e0b');
    return;
  }

  lastClick = now;

  if (adInProgress || adUnlocked) return;

  adInProgress=true;
  tabHidden=false;

  const btn=document.getElementById('btn-watch');
  const txt=document.getElementById('watch-text');

  btn.disabled=true;
  txt.innerText='Loading...';

  startProgressBar();

  try{
    adStartTime=Date.now();

    await adsCtrl.show();

    const watchTime = Date.now()-adStartTime;

    if (tabHidden) throw 'tab_switch';
    if (watchTime < MIN_WATCH_TIME) throw 'too_fast';

    stopProgressBar(true);

    adUnlocked=true;
    btn.style.display='none';

    enableEnroll();
    setStatus('✅ Unlocked!', '#10b981');

  }catch(e){

    stopProgressBar(false);

    const msg = String(e).toLowerCase();

    if (msg.includes('too_fast') || msg.includes('tab')) {
      btn.disabled=false;
      txt.innerText='▶ Watch Ad';
      setStatus('⚠️ Watch full ad', '#ef4444');
    } else {
      unlockDirect();
    }

  }finally{
    adInProgress=false;
  }
}

/* ===== UNLOCK ===== */
function unlockDirect(){
  adUnlocked=true;
  document.getElementById('btn-watch').style.display='none';
  enableEnroll();
  setStatus('✅ Ready', '#10b981');
}

/* ===== HELPERS ===== */
function enableEnroll(){
  const btn=document.getElementById('btn-enroll');
  btn.disabled=false;
}

function goToCourse(){
  if (!adUnlocked) return;
  window.location.href="https://www.udemy.com/";
}

function setStatus(msg,color){
  const el=document.getElementById('status-note');
  el.innerText=msg;
  el.style.color=color;
}

/* ===== PROGRESS ===== */
function startProgressBar(){
  const wrap=document.getElementById('ad-progress-wrap');
  const bar=document.getElementById('ad-progress-bar');
  wrap.style.display='block';
  bar.style.width='0%';

  let start=Date.now();
  window.prog=setInterval(()=>{
    let p=Math.min((Date.now()-start)/150,90);
    bar.style.width=p+'%';
  },200);
}

function stopProgressBar(ok){
  clearInterval(window.prog);
  const bar=document.getElementById('ad-progress-bar');
  bar.style.width = ok ? '100%' : '0%';
}

</script>

</body>
</html>
